<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>writevoid.com - stop writing, and the void takes it.</title>

  <meta name="description"
    content="The void is hungry. Stop typing, and your words fade away. writevoid.com is a minimalist, distraction-free writing space where focus is the only way to keep your thoughts. Open source, no tracking, works fully offline." />
  <meta name="author" content="writevoid contributors" />
  <meta name="keywords"
    content="writing, distraction-free, ephemeral writing, focus, minimalist, open source, offline, pwa" />

  <meta property="og:title" content="writevoid.com - stop writing, and the void takes it." />
  <meta property="og:description"
    content="A minimalist writing space where your words vanish if you stop. Keep the flow or lose it all to the void. Open source and private." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://writevoid.com" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="writevoid.com - stop writing, and the void takes it." />
  <meta name="twitter:description"
    content="The ultimate distraction-free writing experience. Stop typing, and the void takes your words. Open source, offline, and zero tracking." />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="writevoid" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Hover zone at top -->
  <div id="top-hover-zone"></div>

  <!-- Menu bar - appears on hover -->
  <header id="menu-bar">
    <div class="menu-left">
      <span id="logo">writevoid</span>
    </div>
    <div class="menu-right">
      <div class="menu-item">
        <label for="limit-input">word limit for download</label>
        <input id="limit-input" type="number" min="1" inputmode="numeric" placeholder="1000" />
      </div>
      <div class="menu-item">
        <button id="theme-btn">dark</button>
      </div>
    </div>
  </header>

  <!-- Writing surface - full screen -->
  <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="start writing..."></div>

  <!-- Word count and download container - bottom right -->
  <div id="wordcount-container">
    <div id="wordcount">0</div>
    <button id="download-btn-bottom" class="download-btn">download</button>
  </div>

  <script src="app.js"></script>
</body>

</html>
